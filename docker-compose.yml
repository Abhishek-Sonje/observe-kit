services:
  backend:
    build:
      context: .
      dockerfile: ./packages/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
    - CLICKHOUSE_URL=http://clickhouse:8123
    - CLICKHOUSE_HOST=clickhouse
    - CLICKHOUSE_USER=admin
    - CLICKHOUSE_PASSWORD=secret
    - CLICKHOUSE_DATABASE=observekit
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - DATABASE_URL=postgresql://admin:secret@postgres:5432/observekit
    - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
    - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    depends_on:
      - clickhouse
      - redis
      - postgres

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: observekit
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: secret
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: observekit
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
    - postgres_data:/var/lib/postgresql/data

volumes:
  clickhouse_data:
  redis_data:
  postgres_data: